services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: chart-pattern-alert-api:local
    container_name: chart-pattern-alert-api
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-https://reisun.github.io,http://localhost:5173}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-300}
      - MAX_RANGE_DAYS=${MAX_RANGE_DAYS:-60}
      - DATA_SOURCE=${DATA_SOURCE:-yfinance}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
    ports:
      # 開発用にホスト公開。
      # 本番では上流プロキシが同一ネットワーク内から参照するため、
      # 必要に応じてコメントアウト or 削除してよい。
      - "8000:8000"
    networks:
      - chart-pattern-alert-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  chart-pattern-alert-net:
    name: chart-pattern-alert-net
    external: true
